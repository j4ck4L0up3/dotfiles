# Font
font_family      DMMono Nerd Font Mono Medium
font_size        16.0

# You can tweak this to fix your half-moon alignment!
modify_font cell_height 2px

# Dracula color scheme
foreground            #f8f8f2
background            #282a36
selection_foreground  #ffffff
selection_background  #44475a

color0  #21222c
color1  #ff5555
color2  #50fa7b
color3  #f1fa8c
color4  #bd93f9
color5  #ff79c6
color6  #8be9fd
color7  #f8f8f2
color8  #6272a4
color9  #ff6e6e
color10 #69ff94
color11 #ffffa5
color12 #d6acff
color13 #ff92df
color14 #a4ffff
color15 #ffffff

# Terminal transparency
background_opacity 0.2
dynamic_background_opacity yes

# Shell
shell bash

# Misc
scrollback_lines 10000
enable_audio_bell no

