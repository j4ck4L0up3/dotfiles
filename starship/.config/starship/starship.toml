"$schema" = 'https://starship.rs/config-schema.json'

format = """
[оӮ¶](#bd93f9)\
$directory\
[оӮҙ ](fg:#bd93f9 bg:#44475a)\
$git_branch\
$git_status\
[оӮҙ ](fg:#44475a bg:#50fa7b)\
$time\
[оӮҙ ](fg:#50fa7b)\
$nodejs\
$rust\
$golang\
$php\
\n$character"""


# Use the color palette
palette = "dracula"

# Define Dracula color palette
[palettes.dracula]
background = "#282a36"
current_line = "#44475a"
foreground = "#f8f8f2"
comment = "#6272a4"
cyan = "#8be9fd"
green = "#50fa7b"
orange = "#ffb86c"
pink = "#ff79c6"
purple = "#bd93f9"
red = "#ff5555"
yellow = "#f1fa8c"

[directory]
style = "fg:foreground bg:purple bold "
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:current_line"
format = '[[ $symbol $branch ](fg:#bd93f9 bg:#44475a)]($style)'

[git_status]
style = "bg:current_line"
format = '[[($all_status$ahead_behind )](fg:#f1fa8c bg:#44475a)]($style)'

[character]
success_symbol = "[уұһ©](fg:cyan bold)"

[nodejs]
symbol = "оҙҚ"
style = "fg:green bold"
format = '[ $symbol ($version)]($style)'

[rust]
symbol = "оһЁ"
style = ""
format = '[ $symbol ($version)](fg:#ff5555)'

[golang]
symbol = "оҳ§"
style = ""
format = '[ $symbol ($version)](fg:#8be9fd)'

[php]
symbol = "оҳҲ"
style = ""
format = '[ $symbol ($version)](fg:#ffb86c)'

[time]
disabled = false
time_format = "%R"
style = "fg:background bg:green bold"
format = '[ пҗә  $time]($style)'
